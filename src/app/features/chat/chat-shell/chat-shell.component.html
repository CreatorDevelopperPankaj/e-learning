<div class="chat-shell" [class.chat-shell--mobile]="isMobile()">
  <div class="chat-shell__grid">
    <aside class="chat-shell__left" aria-label="Chat sidebar left">
      <app-chat-sidebar-left></app-chat-sidebar-left>
    </aside>

    <main class="chat-shell__center" aria-label="Chat main area">
      <app-chat-header></app-chat-header>

      <section class="chat-shell__messages">
        <app-chat-messages></app-chat-messages>
      </section>

      <app-message-input></app-message-input>
    </main>

    <aside class="chat-shell__right" aria-label="Chat sidebar right">
      <app-chat-sidebar-right></app-chat-sidebar-right>
    </aside>
  </div>
</div>
