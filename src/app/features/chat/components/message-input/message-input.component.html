<div class="composer">
  <button class="circle-btn add" aria-label="Add" (click)="addMenu.toggle($event)">
    <mat-icon>add</mat-icon>
  </button>

  <p-menu #addMenu [popup]="true" [model]="addMenuItems" appendTo="body" styleClass="composer-add-menu"></p-menu>

  <input type="text" placeholder="Write a message..." [value]="draft()"
    (input)="draft.set($any($event.target).value)" (keydown.enter)="onSend()">

  <input #fileInput class="file-picker" type="file" (change)="onFile($event)">
  <input #imageInput class="file-picker" type="file" accept="image/*" (change)="onFile($event)">
  <input #videoInput class="file-picker" type="file" accept="video/*" (change)="onFile($event)">

  <button class="icon-btn emoji" aria-label="Emoji">
    <mat-icon>sentiment_satisfied_alt</mat-icon>
  </button>

  <button class="circle-btn send" (click)="onSend()" aria-label="Send">
    <mat-icon>send</mat-icon>
  </button>
</div>
