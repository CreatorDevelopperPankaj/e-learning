<div class="activity-card">

  <h3>Recent Activity</h3>

  @for(item of activities; track item.title){

    <div class="activity-item" [routerLink]="item.route">

      <div
        class="timeline-dot"
        [class]="item.color">
      </div>

      <div class="content">

        <strong>{{ item.title }}</strong>

        <span>{{ item.subtitle }}</span>

      </div>

      <small>{{ item.time }}</small>

    </div>

  }

</div>
