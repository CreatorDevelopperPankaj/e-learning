<section class="hero-section" id="home">
  <div class="hero-bg-shape"></div>

  <div class="grid align-items-center hero-content">

    <!-- Left Content -->
    <div class="col-12 lg:col-6">

      <span class="hero-badge">
        🚀 #1 Online Learning Platform
      </span>

      <h1 class="hero-title">
        Learn New Skills &
        <span>Advance Your Career</span>
      </h1>

      <p class="hero-description">
        Access 5000+ courses from industry experts.
        Learn Angular, React, AI, Data Science,
        Cyber Security and more.
      </p>

      <div class="hero-buttons">
        <p-button label="Start Learning" icon="pi pi-play" styleClass="start-btn">
        </p-button>

        <p-button label="Explore Courses" severity="secondary" outlined="true">
        </p-button>
      </div>

      <div class="hero-stats">
        <div>
          <h3>50K+</h3>
          <span>Students</span>
        </div>

        <div>
          <h3>5000+</h3>
          <span>Courses</span>
        </div>

        <div>
          <h3>4.9 ★</h3>
          <span>Rating</span>
        </div>
      </div>

    </div>

    <!-- Right Image -->
    <div class="col-12 lg:col-6">

      <div class="image-wrapper">

        <img [src]="currentSlide.image" class="hero-image" alt="Learning">

        <div class="floating-card card-course">
          📚 150+ New Courses
        </div>

        <div class="floating-card card-rating">
          ⭐ 4.9 Rating
        </div>

        <div class="floating-card card-students">
          👨‍🎓 50K Students
        </div>

      </div>
    </div>

  </div>
</section>
<section id="pricing">
  <app-pricing></app-pricing>
</section>

<section id="faq">
  <app-faq></app-faq>
</section>

<section id="about">
  <app-about></app-about>
</section>
